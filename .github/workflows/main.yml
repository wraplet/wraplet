name: Tests
on: [push, pull_request, workflow_dispatch]
permissions:
  contents: read
  packages: read
jobs:
  test:
    name: Testing code.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v3.5.3
      - name: Enabling pnpm.
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Installing dependencies.
        run: pnpm install --frozen-lockfile
      - name: Running tests.
        run: pnpm run tests
      - name: Running performance tests.
        run: pnpm run tests:perf
      - name: Testing size
        run: pnpm run size
      - name: Linting check.
        run: pnpm run lint